name: Build, publish and deploy to MonsterASP.NET

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0

      - name: Install dependencies
        run: dotnet restore CampRegistrationApp/CampRegistrationApp.csproj

      - name: Build
        run: dotnet build CampRegistrationApp/CampRegistrationApp.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish CampRegistrationApp/CampRegistrationApp.csproj --configuration Release --output ./publish --runtime win-x86

      - name: Run tests
        run: dotnet test CampRegistrationApp.Tests/CampRegistrationApp.Tests.csproj --configuration Release --no-restore

      - name: Deploy to MonsterASP.NET via WebDeploy
        uses: rasmusbuchholdt/simply-web-deploy@2.1.0
        with:
          website-name: ${{ secrets.WEBSITE_NAME }}
          server-computer-name: ${{ secrets.SERVER_COMPUTER_NAME }}
          server-username: ${{ secrets.SERVER_USERNAME }}
          server-password: ${{ secrets.SERVER_PASSWORD }}
